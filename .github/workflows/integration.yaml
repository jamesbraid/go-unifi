---
name: Integration

# Boots a disposable simulation-mode controller (jacobalberty/unifi) and
# runs the integration-tagged suite: harness smoke test + v2 schema drift
# probe. PRs touching schema inputs/outputs get it as a gate; the nightly
# run catches upstream drift and image rot independent of PRs.
#
# go.mod/go.sum and all workflow files are in the filter so dependabot
# PRs (gomod and github-actions bumps) still get the check once branch
# protection requires it — a required, path-filtered check never reports
# on non-matching PRs and they hang on "Expected". Docs-only PRs remain
# outside the filter; if those ever need to merge under a required
# Integration check, add a same-name no-op workflow on the inverse
# paths.
on:
  pull_request:
    paths:
      - 'schemas/**'
      - 'overrides/**'
      - 'unifi/**'
      - 'cmd/fields/**'
      - 'internal/testenv/**'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/**'
  schedule:
    - cron: 30 1 * * *
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration:
    name: Integration
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: 'go.mod'

      # Current jacobalberty/unifi images (v10.0.162 and latest, which
      # bundles the same build) cannot install a runtime PKGURL: the
      # entrypoint only runs /usr/local/bin/docker-build.sh "$PKGURL" if
      # that script exists, and it does not in either tag, so PKGURL is
      # silently ignored. Even a manual dpkg -i of a 10.4.x deb leaves
      # unifi unconfigured (needs Java 25, absent from the image). So
      # rather than claim a pin that never applies, just report what the
      # schemas were built from and let the suite run the image's
      # bundled build. UNIFI_TEST_PKGURL is still honoured by the
      # harness (internal/testenv/controller.go) for whenever an image
      # regains runtime install support; the smoke test added for that
      # case (TestIntegrationControllerBoots) fails loudly if a pin is
      # requested but not honoured, so re-enabling this is safe.
      - name: Report controller provenance
        run: |
          artifact="$(cat schemas/ARTIFACT 2>/dev/null || true)"
          case "${artifact}" in
            https://*.deb)
              echo "::warning title=Controller pin unavailable::schemas built from ${artifact} but current jacobalberty/unifi images cannot install it at runtime (docker-build.sh removed; 10.4.x needs Java 25). Suite runs the image default build."
              ;;
            *)
              echo "No pinnable .deb artifact (${artifact:-none}); using image default"
              ;;
          esac

      - name: Run integration suite
        run: >-
          go test -tags integration -timeout 25m -v
          ./internal/testenv/ ./cmd/fields/
          -run 'TestIntegration'
