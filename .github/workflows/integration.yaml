---
name: Integration

# Boots a disposable simulation-mode controller (jacobalberty/unifi) and
# runs the integration-tagged suite: harness smoke test + v2 schema drift
# probe. PRs touching schema inputs/outputs get it as a gate; the nightly
# run catches upstream drift and image rot independent of PRs.
#
# Path-filtered so it stays fast, which means integration-noop.yaml must
# cover every PR outside this filter — see the design doc for why:
# docs/superpowers/specs/2026-07-17-schema-fetcher-uos-design.md
on:
  pull_request:
    paths:
      - 'schemas/**'
      - 'overrides/**'
      - 'unifi/**'
      - 'cmd/fields/**'
      - 'internal/testenv/**'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/**'
  schedule:
    - cron: 30 1 * * *
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration:
    name: Integration
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: 'go.mod'

      # Current jacobalberty/unifi images cannot run UniFi 10.4.x (needs
      # Java 25) and ignore a runtime PKGURL (no docker-build.sh in the
      # image), so we build our own image instead. The starkjs fork of
      # unifi-docker (feature/update_for_java25_24.04) rebases onto Ubuntu
      # 24.04 with Java 25 and turns PKGURL into a build arg consumed by
      # its docker-build.sh, so the exact artifact the schemas came from
      # can be baked in at build time. The build context is a git URL
      # pinned at an exact commit, matching the SHA-pinning we use for
      # actions elsewhere in this workflow.
      - name: Build pinned controller image
        id: controller-image
        run: |
          artifact="$(cat schemas/ARTIFACT 2>/dev/null || true)"
          case "${artifact}" in
            https://*.deb)
              if docker build \
                  --build-arg PKGURL="${artifact}" \
                  -t unifi-pinned:ci \
                  "https://github.com/starkjs/unifi-docker.git#924776c994a0541c66660d256324406d29431d4b"; then
                echo "image=unifi-pinned:ci" >> "$GITHUB_OUTPUT"
                echo "expect=$(cat schemas/VERSION)" >> "$GITHUB_OUTPUT"
              else
                echo "::warning title=Controller pin unavailable::docker build failed for ${artifact}; suite falls back to the harness default image."
                echo "image=" >> "$GITHUB_OUTPUT"
                echo "expect=" >> "$GITHUB_OUTPUT"
              fi
              ;;
            *)
              echo "::warning title=Controller pin unavailable::no pinnable .deb artifact (${artifact:-none}); suite falls back to the harness default image."
              echo "image=" >> "$GITHUB_OUTPUT"
              echo "expect=" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Run integration suite
        env:
          UNIFI_TEST_IMAGE: ${{ steps.controller-image.outputs.image }}
          UNIFI_TEST_EXPECT_VERSION: ${{ steps.controller-image.outputs.expect }}
        run: >-
          go test -tags integration -p 1 -timeout 25m -v
          ./internal/testenv/ ./cmd/fields/
          -run 'TestIntegration'
