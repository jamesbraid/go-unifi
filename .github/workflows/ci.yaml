---
name: CI/CD Checks

on:
  pull_request: {}
  push:
    branches:
      - 'main'
    tags:
      - 'v*'

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.ref }}

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: 'go.mod'

      # Gitignored extracted-definitions cache; a hit avoids re-downloading
      # the controller artifact on every PR.
      - name: Restore schema cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            schemas/fields
            schemas/metadata
          key: schemas-${{ hashFiles('schemas/SOURCE') }}

      - name: Generate
        id: generate
        run: |
          before="$(cat schemas/SOURCE 2>/dev/null || true)"
          go generate ./...
          after="$(cat schemas/SOURCE 2>/dev/null || true)"
          if [ "${before}" = "${after}" ]; then
            echo "upstream_moved=false" >> "$GITHUB_OUTPUT"
          else
            echo "upstream_moved=true" >> "$GITHUB_OUTPUT"
            echo "Upstream published ${after} since this PR's ${before}"
          fi

      # Blocking when the PR's tracked SOURCE still matches upstream: a diff
      # then means the PR changed generator inputs without committing the
      # regenerated output. Skipped when a new controller release appeared
      # mid-PR, so unrelated PRs aren't failed by upstream timing.
      - name: Check for changes
        if: steps.generate.outputs.upstream_moved != 'true'
        run: git diff --compact-summary --exit-code

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: 'go.mod'

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        continue-on-error: true
        with:
          version: latest
          args: --timeout=10m

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: 'go.mod'

      # Blocking: this is the check that gates auto-merged schema updates.
      - name: Run tests
        run: go test ./...

  yamllint:
    runs-on: 'ubuntu-latest'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ibiqlik/action-yamllint@2576378a8e339169678f9939646ee3ee325e845c # v3.1.1
        continue-on-error: true
