---
name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

jobs:
  verify-generated-tree:
    name: Verify Generated Tree
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # v6.5.0
        with:
          go-version-file: go.mod

      - name: Verify committed generated tree
        run: go run ./cmd/fields -verify-committed

      - name: Require clean tracked tree
        run: git diff --exit-code

  test:
    name: Go Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # v6.5.0
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

      - name: Require clean tracked tree
        run: git diff --exit-code

  vet:
    name: Go Vet
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # v6.5.0
        with:
          go-version-file: go.mod

      - name: Run vet
        run: go vet ./...

      - name: Require clean tracked tree
        run: git diff --exit-code

  lint:
    name: Go Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # v6.5.0
        with:
          go-version-file: go.mod

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a  # v9.3.0
        with:
          version: v2.11.4
          args: --timeout=10m

      - name: Require clean tracked tree
        run: git diff --exit-code

  yamllint:
    name: YAML Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Run yamllint
        uses: ibiqlik/action-yamllint@2576378a8e339169678f9939646ee3ee325e845c  # v3.1.1

      - name: Require clean tracked tree
        run: git diff --exit-code

  api-compatibility:
    name: API Compatibility
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact base
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          repository: ${{ github.repository }}
          ref: ${{ github.event.pull_request.base.sha || github.event.before }}
          path: base
          persist-credentials: false

      - name: Checkout exact candidate
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          path: candidate
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # v6.5.0
        with:
          go-version-file: candidate/go.mod

      - name: Compare pull request API
        if: github.event_name == 'pull_request'
        working-directory: base
        shell: bash
        env:
          APICOMPAT_BOOTSTRAP_SHA256: f5729a9a15a6cda97b980e7e399384b6d3ea8332b40a3a41228e334eb0fb9228
          BREAKING_API_APPROVED: ${{ contains(github.event.pull_request.labels.*.name, 'breaking-api-approved') }}
        run: |
          if [[ -f cmd/apicompat/main.go ]]; then
            go build -o "$RUNNER_TEMP/apicompat" ./cmd/apicompat
          else
            bootstrap_sha256="$(sha256sum ../candidate/cmd/apicompat/main.go | cut -d ' ' -f 1)"
            if [[ "$bootstrap_sha256" != "$APICOMPAT_BOOTSTRAP_SHA256" ]]; then
              echo "refusing unreviewed API comparator bootstrap" >&2
              exit 1
            fi
            GOWORK=off GOFLAGS=-mod=readonly \
              go build -o "$RUNNER_TEMP/apicompat" ../candidate/cmd/apicompat/main.go
          fi
          set +e
          "$RUNNER_TEMP/apicompat" -base . -candidate ../candidate \
            -markdown "$RUNNER_TEMP/api-compat.md" > /dev/null
          status=$?
          set -e
          if [[ -f "$RUNNER_TEMP/api-compat.md" ]]; then
            cat "$RUNNER_TEMP/api-compat.md" >> "$GITHUB_STEP_SUMMARY"
          fi
          case "$status" in
            0) exit 0 ;;
            2)
              if [[ "$BREAKING_API_APPROVED" == "true" ]]; then
                echo "::warning title=Breaking API approved::Breaking API change approved by maintainer label"
                echo "> [!WARNING]" >> "$GITHUB_STEP_SUMMARY"
                echo "> Breaking API change approved by maintainer label." >> "$GITHUB_STEP_SUMMARY"
                exit 0
              fi
              exit 2
              ;;
            3) exit 3 ;;
            *) echo "unexpected API comparison status: $status" >&2; exit 3 ;;
          esac

      - name: Compare push API
        if: github.event_name == 'push'
        id: push-api
        working-directory: candidate
        shell: bash
        run: |
          go build -o "$RUNNER_TEMP/apicompat" ./cmd/apicompat
          set +e
          "$RUNNER_TEMP/apicompat" -base ../base -candidate . \
            -markdown "$RUNNER_TEMP/api-compat.md" > /dev/null
          status=$?
          set -e
          if [[ -f "$RUNNER_TEMP/api-compat.md" ]]; then
            cat "$RUNNER_TEMP/api-compat.md" >> "$GITHUB_STEP_SUMMARY"
          fi
          case "$status" in
            0) echo "status=compatible" >> "$GITHUB_OUTPUT" ;;
            2) echo "status=breaking" >> "$GITHUB_OUTPUT" ;;
            3) exit 3 ;;
            *) echo "unexpected API comparison status: $status" >&2; exit 3 ;;
          esac

      - name: Verify approved breaking push
        if: github.event_name == 'push' && steps.push-api.outputs.status == 'breaking'
        shell: bash
        env:
          CANDIDATE_SHA: ${{ github.sha }}
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          gh api -H 'Accept: application/vnd.github+json' \
            "/repos/$REPOSITORY/commits/$CANDIDATE_SHA/pulls" \
            > "$RUNNER_TEMP/associated-api-prs.json"
          jq -e --arg repo "$REPOSITORY" '
            [.[] | select(
              .merged_at != null and
              .base.ref == "main" and
              .base.repo.full_name == $repo
            )] as $prs |
            ($prs | length == 1) and
            ($prs[0].labels | map(.name) | index("breaking-api-approved") != null)
          ' "$RUNNER_TEMP/associated-api-prs.json" > /dev/null
          echo "::warning title=Breaking API approved::Merged PR carries breaking-api-approved"
          echo "> [!WARNING]" >> "$GITHUB_STEP_SUMMARY"
          echo "> Breaking API change was approved on the single associated merged PR." >> "$GITHUB_STEP_SUMMARY"

      - name: Require clean API comparison trees
        run: |
          git -C base diff --exit-code
          git -C candidate diff --exit-code

  tracked-diff:
    name: Tracked Diff
    if: always()
    needs:
      - verify-generated-tree
      - test
      - vet
      - lint
      - yamllint
      - api-compatibility
    runs-on: ubuntu-latest
    steps:
      - name: Require all mutation checks
        env:
          VERIFY_RESULT: ${{ needs.verify-generated-tree.result }}
          TEST_RESULT: ${{ needs.test.result }}
          VET_RESULT: ${{ needs.vet.result }}
          LINT_RESULT: ${{ needs.lint.result }}
          YAMLLINT_RESULT: ${{ needs.yamllint.result }}
          API_RESULT: ${{ needs.api-compatibility.result }}
        run: |
          test "$VERIFY_RESULT" = success
          test "$TEST_RESULT" = success
          test "$VET_RESULT" = success
          test "$LINT_RESULT" = success
          test "$YAMLLINT_RESULT" = success
          test "$API_RESULT" = success
